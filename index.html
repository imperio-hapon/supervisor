<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Império Hap-on</title>
 
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  background: #f4f6fb;
}
 
.menu {
  width: 250px;
  background: #1a1a2e;
  color: #fff;
  height: 100vh;
  padding: 20px 15px;
}
 
.menu h2 {
  font-size: 18px;
  margin-bottom: 25px;
}
 
.menu button {
  display: block;
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #ffffff;
  font-weight: 600;
  transition: 0.2s;
}
 
.menu button:hover {
  background: #4361ee;
  color: #fff;
}
 
.menu button.active {
  background: #4361ee;
  color: #fff;
}
 
iframe {
  flex: 1;
  border: none;
  background: #fff;
}
</style>
</head>
 
<body>
 
<div class="menu">
<h2>📊 Império Hap-on</h2>
 
  <button onclick="loadPage('vidas.html', this)" class="active">Vidas</button>
<button onclick="loadPage('conversao.html', this)">Conversão</button>
<button onclick="loadPage('disponivel.html', this)">Disponível / 1º resposta</button>
<button onclick="loadPage('carteira.html', this)">Carteira de Clientes</button>
<button onclick="loadPage('disparos.html', this)">Disparos</button>
<button onclick="loadPage('leads.html', this)">Leads</button>
<button onclick="loadPage('qualidade.html', this)">Qualidade</button>
<button onclick="loadPage('absenteismo.html', this)">Absenteísmo</button>
</div>
 
<iframe id="frame" src="vidas.html"></iframe>
 
<script>
function loadPage(page, element){
  document.getElementById('frame').src = page;
 
  // remover ativo de todos
  document.querySelectorAll('.menu button').forEach(btn => {
    btn.classList.remove('active');
  });
 
  // ativar o clicado
  element.classList.add('active');
}
</script>
 
</body>
</html>
