<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Império Hap-on — Josy Bomfim</title>
 
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f7;padding:16px;color:#1a1a2e;font-size:13px}
 
/* TÍTULO */
h1{font-size:16px;font-weight:800;margin-bottom:2px}
.subtitle{font-size:11.5px;color:#666;margin-bottom:14px}
 
/* KPIs */
.kpi-row,.kpi-row2{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px}
.kpi{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-top:3px solid #ccc}
.kpi-label{font-size:10px;text-transform:uppercase;color:#888}
.kpi-value{font-size:20px;font-weight:800}
.kpi-pct{font-size:11px;font-weight:700}
.kpi-sub{font-size:10px;color:#999}
 
/* SEÇÕES */
.section-title{font-size:12px;font-weight:700;margin:14px 0 8px;color:#555}
 
/* CARDS SUP */
.sup-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sup-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sup-name{font-size:11px;font-weight:800}
.sup-alias{font-size:10px;color:#aaa;margin-bottom:6px}
.sup-stats{display:flex;justify-content:space-between}
.sup-stat-val{font-size:12px;font-weight:800}
.bar-bg{background:#eee;height:6px;border-radius:20px;margin-top:6px}
.bar-fill{height:100%;background:#4361ee;border-radius:20px}
 
/* TABELA */
.table-wrap{background:#fff;border-radius:12px;padding:12px;margin-top:10px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;font-size:12px}
thead{background:#f5f5f5}
 
/* BASE */
.bases-tabs-nav{display:flex;gap:6px;margin-top:20px}
.base-tab{padding:6px 16px;border-radius:20px;border:1px solid #ddd;cursor:pointer}
.base-tab.active{background:#4361ee;color:#fff}
 
</style>
</head>
 
<body>
 
<h1>📊 Painel de Performance — Equipe Império</h1>
<p class="subtitle">Gestão Josy Bomfim · Atualizado</p>
 
<div id="kpi-row1" class="kpi-row"></div>
<div id="kpi-row2" class="kpi-row2"></div>
 
<div class="section-title">Performance por Equipe</div>
<div id="sup-grid" class="sup-grid"></div>
 
<div class="section-title">Ranking</div>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>#</th>
<th>Promotor</th>
<th>Equipe</th>
<th>Vidas</th>
<th>Meta</th>
<th>%</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
 
<div class="section-title">📋 Bases de Vendas</div>
 
<div class="bases-tabs-nav">
<button class="base-tab active">PF</button>
<button class="base-tab">Adesão</button>
<button class="base-tab">PME</button>
</div>
 
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Promotor</th>
<th>Supervisor</th>
<th>Cliente</th>
<th>Data</th>
</tr>
</thead>
<tbody id="base-tbody"></tbody>
</table>
</div>
 
<script>
 
/* ===== DADOS ===== */
const data = [
{nome:"Aline", eq:"Alfa", v:64, meta:90},
{nome:"Andreza", eq:"Gladiadores", v:91, meta:90},
{nome:"Giovanna", eq:"Adm", v:64, meta:60},
];
 
/* ===== KPIs ===== */
function renderKPIs(){
let total = data.reduce((a,b)=>a+b.v,0);
let meta = data.reduce((a,b)=>a+b.meta,0);
 
document.getElementById("kpi-row1").innerHTML = `
<div class="kpi">
<div class="kpi-label">Vidas</div>
<div class="kpi-value">${total}</div>
</div>
 
<div class="kpi">
<div class="kpi-label">Meta</div>
<div class="kpi-value">${meta}</div>
</div>
 
<div class="kpi">
<div class="kpi-label">% Atingido</div>
<div class="kpi-value">${((total/meta)*100).toFixed(1)}%</div>
</div>
`;
}
 
/* ===== SUPERVISORES ===== */
function renderSup(){
document.getElementById("sup-grid").innerHTML = data.map(r=>`
<div class="sup-card">
<div class="sup-name">${r.nome}</div>
<div class="sup-alias">${r.eq}</div>
<div class="sup-stats">
<span>${r.v}</span>
<span>${r.meta}</span>
</div>
<div class="bar-bg">
<div class="bar-fill" style="width:${(r.v/r.meta)*100}%"></div>
</div>
</div>
`).join('');
}
 
/* ===== TABELA ===== */
function renderTable(){
document.getElementById("tbody").innerHTML = data.map((r,i)=>`
<tr>
<td>${i+1}</td>
<td>${r.nome}</td>
<td>${r.eq}</td>
<td>${r.v}</td>
<td>${r.meta}</td>
<td>${((r.v/r.meta)*100).toFixed(1)}%</td>
</tr>
`).join('');
}
 
/* ===== INIT ===== */
renderKPIs();
renderSup();
renderTable();
 
</script>
 
</body>
</html>
