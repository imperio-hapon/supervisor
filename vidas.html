<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Império Hap-on — Josy Bomfim</title>
 
<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
h1{font-size:18px}
.kpi{background:#fff;padding:12px;border-radius:10px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.card{background:#fff;padding:10px;border-radius:10px}
.bar{height:6px;background:#eee;border-radius:10px;margin-top:5px}
.fill{height:100%;background:#4361ee;border-radius:10px}
table{width:100%;background:#fff;border-radius:10px;margin-top:10px}
td,th{padding:6px;font-size:12px}
</style>
 
</head>
<body>
 
<h1>📊 Painel de Performance — Equipe Império</h1>
 
<div id="kpis"></div>
 
<div class="grid" id="cards"></div>
 
<table>
<thead>
<tr>
<th>#</th>
<th>Promotor</th>
<th>Equipe</th>
<th>PF</th>
<th>Adesão</th>
<th>PME</th>
<th>Total</th>
<th>Meta</th>
<th>%</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
 
<script>
 
/* ===== DADOS ATUALIZADOS DA PLANILHA ===== */
const rawData = [
{"s":"HUMBERTO BANQUERI","p":"JAQUELINE SILVA","meta":90,"v":128,"pf":98,"a":0,"pme":30,"dz":0},
{"s":"HUMBERTO BANQUERI","p":"BRUNA CAMPASSI","meta":90,"v":118,"pf":110,"a":0,"pme":8,"dz":0},
{"s":"HUMBERTO BANQUERI","p":"MARIANA FELIX","meta":90,"v":110,"pf":75,"a":0,"pme":35,"dz":0},
{"s":"HUMBERTO BANQUERI","p":"JULIA SILVA","meta":90,"v":87,"pf":87,"a":0,"pme":0,"dz":0},
{"s":"HUMBERTO BANQUERI","p":"ROBSON SOUZA","meta":90,"v":86,"pf":51,"a":0,"pme":35,"dz":0},
{"s":"HUMBERTO BANQUERI","p":"SUELLEN GUIMARAES","meta":90,"v":52,"pf":37,"a":0,"pme":15,"dz":0},
 
{"s":"LUIZ ROBERTO","p":"ANA CAROLINA ANTUNES","meta":90,"v":95,"pf":95,"a":0,"pme":0,"dz":0},
{"s":"LUIZ ROBERTO","p":"ANDREZZA MACCHINI","meta":90,"v":91,"pf":91,"a":0,"pme":0,"dz":0},
{"s":"LUIZ ROBERTO","p":"RAYANE LOPES","meta":80,"v":51,"pf":51,"a":0,"pme":0,"dz":0},
{"s":"LUIZ ROBERTO","p":"UNILDO FERREIRA","meta":70,"v":51,"pf":51,"a":0,"pme":0,"dz":0},
{"s":"LUIZ ROBERTO","p":"RAIANE LIMA","meta":70,"v":52,"pf":52,"a":0,"pme":0,"dz":0},
 
{"s":"REBECA MOURA","p":"GUSTAVO BARROS","meta":80,"v":68,"pf":64,"a":4,"pme":0,"dz":0},
{"s":"REBECA MOURA","p":"ELISAMA GIZZI","meta":100,"v":65,"pf":65,"a":0,"pme":0,"dz":0},
{"s":"REBECA MOURA","p":"THAINA BERCHELI","meta":90,"v":54,"pf":52,"a":2,"pme":0,"dz":0},
{"s":"REBECA MOURA","p":"FELIPE SOUZA","meta":90,"v":56,"pf":53,"a":3,"pme":0,"dz":0},
 
{"s":"BENVE","p":"CAMILA MOREIRA","meta":57,"v":35,"pf":35,"a":0,"pme":0,"dz":0},
{"s":"BENVE","p":"DANIELLE MUZELL","meta":57,"v":33,"pf":33,"a":0,"pme":0,"dz":0},
{"s":"BENVE","p":"ANA BEATRIZ MACHUCA","meta":58,"v":32,"pf":32,"a":0,"pme":0,"dz":0}
 
];
 
/* ===== KPI ===== */
function renderKPI(){
let total = rawData.reduce((a,b)=>a+b.v,0);
let meta = rawData.reduce((a,b)=>a+b.meta,0);
 
document.getElementById("kpis").innerHTML = `
<div class="kpi">Vidas: ${total}</div>
<div class="kpi">Meta: ${meta}</div>
<div class="kpi">%: ${(total/meta*100).toFixed(1)}%</div>
`;
}
 
/* ===== CARDS ===== */
function renderCards(){
let grupos = {};
 
rawData.forEach(r=>{
if(!grupos[r.s]) grupos[r.s]={v:0,meta:0};
grupos[r.s].v+=r.v;
grupos[r.s].meta+=r.meta;
});
 
document.getElementById("cards").innerHTML =
Object.entries(grupos).map(([sup,val])=>{
let pct = (val.v/val.meta*100).toFixed(1);
return `
<div class="card">
<strong>${sup}</strong><br>
${val.v} / ${val.meta} (${pct}%)
<div class="bar">
<div class="fill" style="width:${pct}%"></div>
</div>
</div>`;
}).join('');
}
 
/* ===== TABELA ===== */
function renderTable(){
let sorted = [...rawData].sort((a,b)=>b.v-a.v);
 
document.getElementById("tbody").innerHTML =
sorted.map((r,i)=>{
let pct = (r.v/r.meta*100).toFixed(1);
return `
<tr>
<td>${i+1}</td>
<td>${r.p}</td>
<td>${r.s}</td>
<td>${r.pf}</td>
<td>${r.a}</td>
<td>${r.pme}</td>
<td><strong>${r.v}</strong></td>
<td>${r.meta}</td>
<td>${pct}%</td>
</tr>`;
}).join('');
}
 
/* ===== INIT ===== */
renderKPI();
renderCards();
renderTable();
 
</script>
 
</body>
</html>
