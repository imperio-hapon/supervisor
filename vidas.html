*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f7;padding:16px;color:#1a1a2e;font-size:13px}
h1{font-size:16px;font-weight:800;margin-bottom:2px}
.subtitle{font-size:11.5px;color:#666;margin-bottom:14px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px}
.kpi-row2{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-top:3px solid #ccc}
.kpi.azul{border-top-color:#4361ee}.kpi.cinza{border-top-color:#aaa}.kpi.laranja{border-top-color:#f77f00}
.kpi.verm{border-top-color:#c0392b}.kpi.verde{border-top-color:#2dc653}.kpi.proj{border-top-color:#f4a261}
.kpi.mvp{border-top-color:#7b2d8b}.kpi.ritmo{border-top-color:#2a9d8f}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:4px}
.kpi-value{font-size:20px;font-weight:800;color:#1a1a2e}
.kpi-pct{font-size:11px;font-weight:700;margin-top:3px}.kpi-sub{font-size:10.5px;color:#999;margin-top:2px}

.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#555;margin:14px 0 8px}
.sup-filter-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.sup-filter-label{font-size:10.5px;font-weight:700;text-transform:uppercase;color:#888;white-space:nowrap}
.sup-chip{padding:5px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#555;user-select:none;transition:all .15s;display:flex;align-items:center;gap:5px}
.sup-chip:hover{border-color:#4361ee;color:#4361ee}
.chip-todos.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.chip-humberto.active{background:#4361ee;color:#fff;border-color:#4361ee}
.chip-luiz.active{background:#f77f00;color:#fff;border-color:#f77f00}
.chip-rebeca.active{background:#1d8a6e;color:#fff;border-color:#1d8a6e}
.chip-benve.active{background:#7b2d8b;color:#fff;border-color:#7b2d8b}
.chip-josy.active{background:#0077b6;color:#fff;border-color:#0077b6}

.sup-grid{display:grid;gap:10px;margin-bottom:14px}
.sup-grid.g5{grid-template-columns:repeat(5,1fr)}
.sup-grid.g4{grid-template-columns:repeat(4,1fr)}
.sup-grid.g3{grid-template-columns:repeat(3,1fr)}
.sup-grid.g2{grid-template-columns:repeat(2,1fr)}
.sup-grid.g1{grid-template-columns:1fr}
.sup-card{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sup-name{font-size:11.5px;font-weight:800;margin-bottom:1px}
.sup-alias{font-size:10px;color:#aaa;margin-bottom:7px}
.sup-stats{display:flex;justify-content:space-between;margin-bottom:7px}
.sup-stat{text-align:center}.sup-stat-val{font-size:12px;font-weight:800}.sup-stat-lbl{font-size:8.5px;color:#999}
.bar-bg{background:#f0f0f0;border-radius:99px;height:7px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:99px}
.bar-exp{position:absolute;top:0;width:2px;background:#333;height:100%;opacity:.35}
.pct-row{display:flex;justify-content:space-between;margin-top:3px}
.pct-lbl{font-size:11px;font-weight:700}.st-lbl{font-size:10px}
.sup-proj{font-size:9.5px;margin-top:4px;padding-top:4px;border-top:1px solid #f0f0f0;color:#555}
.sup-proj strong{color:#f4a261}
.sup-ritmo{font-size:9.5px;margin-top:3px;color:#2a9d8f;font-weight:600}
.sem-wrap{margin-top:8px}
.sem-title{font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.3px;margin-bottom:5px}
.sem-row{display:grid;grid-template-columns:140px 60px 70px 50px;align-items:center;padding:4px 8px;border-radius:5px;margin-bottom:3px;background:#f7f9ff;font-size:10.5px;gap:4px}
.sem-name{color:#555;font-weight:500}.sem-val{font-weight:800;color:#1a1a2e;text-align:right}
.sem-var{font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px;text-align:center}
.sv-up{background:#e8f8ee;color:#1a7a3a}.sv-dn{background:#fdecea;color:#b00020}.sv-eq{background:#f0f0f0;color:#888}
.sem-nota{font-size:9px;color:#f77f00;font-style:italic}

.c-humberto{color:#4361ee}.bar-humberto{background:linear-gradient(90deg,#4361ee,#6c8aff)}
.c-luiz{color:#f77f00}.bar-luiz{background:linear-gradient(90deg,#f77f00,#ffaa44)}
.c-rebeca{color:#1d8a6e}.bar-rebeca{background:linear-gradient(90deg,#1d8a6e,#27c49a)}
.c-josy{color:#0077b6}.bar-josy{background:linear-gradient(90deg,#0077b6,#00b4d8)}
.c-benve{color:#7b2d8b}.bar-benve{background:linear-gradient(90deg,#7b2d8b,#b45ec7)}

.filters-wrap{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-start}
.filter-box{position:relative}
.filter-box label{font-size:10.5px;font-weight:700;text-transform:uppercase;color:#888;display:block;margin-bottom:4px}
.dropdown-btn{padding:6px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#444;display:flex;align-items:center;gap:6px;min-width:130px;justify-content:space-between;white-space:nowrap}
.dropdown-btn:hover{border-color:#4361ee}
.dropdown-menu{position:absolute;top:calc(100%+4px);left:0;background:#fff;border:1.5px solid #ddd;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:300;min-width:180px;padding:6px;display:none;max-height:240px;overflow-y:auto}
.dropdown-menu.open{display:block}
.d-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px;color:#333;user-select:none}
.d-item:hover{background:#f0f4ff}
.d-item input{accent-color:#4361ee;width:14px;height:14px;cursor:pointer}
.search-inp{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;margin-bottom:5px;outline:none}
.search-inp:focus{border-color:#4361ee}

.table-wrap{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);max-height:360px;overflow-y:auto;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:#888;padding:6px 8px;border-bottom:2px solid #f0f0f0;text-align:left;position:sticky;top:0;background:#fff;z-index:1;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#4361ee}
tbody tr:hover{background:#f7f9ff}
td{padding:6px 8px;font-size:12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap}
.badge.dentro{background:#e8f8ee;color:#1a7a3a}
.badge.abaixo{background:#fdecea;color:#b00020}
.badge.zerado{background:#f0f0f0;color:#888}
.badge.especial{background:#fff3cd;color:#856404}
.badge.proj-ok{background:#e8f8ee;color:#1a7a3a;font-size:10px}
.badge.proj-warn{background:#fff8e1;color:#b06000;font-size:10px}
.badge.proj-bad{background:#fdecea;color:#b00020;font-size:10px}

.dz-0{background:#e8f8ee;color:#1a7a3a}
.cv-good{color:#1a7a3a;font-weight:700}
.cv-mid{color:#b06000;font-weight:700}

.dz-m{background:#fff0e0;color:#b54800}.dz-h{background:#fdecea;color:#b00020}

.chart-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chart-title{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:10px}
.chart-sub{font-size:10px;color:#aaa;font-weight:400;margin-left:4px}
.c-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}

.c-ename{font-size:9px;font-weight:600;white-space:nowrap}

.c-val{font-size:10.5px;font-weight:700;color:#333;width:24px;text-align:right;flex-shrink:0}
.zero-list{list-style:none;max-height:380px;overflow-y:auto}
.z-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;border-radius:6px;margin-bottom:3px;background:#fdecea;border-left:3px solid #c0392b}

.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>

function renderKPIs() {

  const mt   = rows.reduce((a,r)=>a+r.meta,0);
  const pf   = rows.reduce((a,r)=>a+r.pf,0);
  const ade  = rows.reduce((a,r)=>a+r.a,0);
  const pme  = rows.reduce((a,r)=>a+r.pme,0);
  // Para totais globais PF/ADE/PME (inclui promotores sem meta)
  const vtGlobal = activeSups.has('todos') ? VTOT : vt;
  const pfGlobal = activeSups.has('todos') ? VPF  : pf;
  const adeGlobal= activeSups.has('todos') ? VADE : ade;
  const pmeGlobal= activeSups.has('todos') ? VPME : pme;
  const mtGlobal = activeSups.has('todos') ? META_TOT : mt;

  const pctR = +(vtGlobal/mtGlobal*100).toFixed(1);
  const proj = Math.round(vtGlobal * PROJ_FATOR);
  const projP= +(proj/mtGlobal*100).toFixed(1);
  const mvp  = rows.length>0?+(vtGlobal/rows.length).toFixed(1):0;
  const cvRows = rows.filter(r=>r.cv!==null&&r.cv!==undefined);
  const avgCv  = cvRows.length>0 ? cvRows.reduce((s,r)=>s+r.cv,0)/cvRows.length : 0;
  const cvCount = cvRows.length;
  const dent = rows.filter(r=>isDentro(r.pct)).length;

  document.getElementById('kpi-row1').innerHTML=`
    <div class="kpi azul"><div class="kpi-label">Vidas Realizadas</div><div class="kpi-value">${N(vtGlobal)}</div><div class="kpi-pct" style="color:#4361ee">${pctR}% da meta</div></div>

    <div class="kpi verm"><div class="kpi-label">GAP atual</div><div class="kpi-value" style="color:#c0392b">-${N(mtGlobal-vtGlobal)}</div><div class="kpi-sub">vidas faltantes p/ 100%</div></div>

  document.getElementById('kpi-row2').innerHTML=`
    <div class="kpi azul"><div class="kpi-label">Vidas PF</div><div class="kpi-value">${N(pfGlobal)}</div><div class="kpi-pct" style="color:#4361ee">${vtGlobal>0?+(pfGlobal/vtGlobal*100).toFixed(1):0}% do total</div></div>
    <div class="kpi verde"><div class="kpi-label">Vidas Adesão</div><div class="kpi-value">${N(adeGlobal)}</div><div class="kpi-pct" style="color:#2dc653">${vtGlobal>0?+(adeGlobal/vtGlobal*100).toFixed(1):0}% do total</div></div>
    <div class="kpi laranja"><div class="kpi-label">Vidas PME</div><div class="kpi-value">${N(pmeGlobal)}</div><div class="kpi-pct" style="color:#f77f00">${vtGlobal>0?+(pmeGlobal/vtGlobal*100).toFixed(1):0}% do total</div></div>

// ─── CHIPS ────────────────────────────────────────────────────────────────
function buildChips() {
  const cont = document.getElementById('sup-chips');
  const mkChip = (key, label, chipCls) => {
    const btn = document.createElement('button');
    btn.className = `sup-chip ${chipCls}`;
    btn.textContent = label;
    btn.dataset.key = key;
    btn.onclick = (e) => toggleSup(key, e.ctrlKey || e.metaKey);
    return btn;
  };
  cont.appendChild(mkChip('todos','● Todos','chip-todos active'));
  SUP_KEYS.forEach(k => cont.appendChild(mkChip(k, '● '+sc(k).label, sc(k).chip)));
}

function toggleSup(key, multi) {
  if (key === 'todos') {
    activeSups = new Set(['todos']);
  } else if (multi) {
    // CTRL+clique: adiciona/remove da seleção múltipla
    activeSups.delete('todos');
    if (activeSups.has(key)) { activeSups.delete(key); if(activeSups.size===0) activeSups.add('todos'); }
    else activeSups.add(key);
  } else {
    // Clique simples: seleciona exclusivamente essa equipe (toggle se já é única)
    if (activeSups.size===1 && activeSups.has(key)) activeSups = new Set(['todos']);
    else activeSups = new Set([key]);
  }
  updateChipStyles();
  renderKPIs();
  renderSupGrid();
  syncFiltersToSup();
  render();
  buildCharts();
}

function updateChipStyles() {
  document.querySelectorAll('#sup-chips .sup-chip').forEach(btn => {
    const k = btn.dataset.key;
    btn.classList.remove('active');
    if (k==='todos' && activeSups.has('todos')) btn.classList.add('active');
    else if (k!=='todos' && activeSups.has(k)) btn.classList.add('active');
  });
}

buildChips();

      ${single?buildSemBlock(key,vt,pct):''}
    </div>`;
  }).join('');
}

function buildSemBlock(key,vt,pct) {
  const sems = SUP_SEMS[key]||[0,0,0,0];
  const mvps = SUP_MVP_SEMS[key]||[0,0,0,0];
  let h='<div class="sem-wrap"><div class="sem-title">📅 Evolução Semanal</div>';
  h+='<div class="sem-row" style="background:#f0f4ff;font-size:9.5px"><span class="sem-name" style="color:#888;font-weight:700">Semana</span><span class="sem-val" style="color:#888;font-size:9.5px">Vidas</span><span style="width:70px;text-align:center;font-size:9.5px;color:#7b2d8b;font-weight:700">MVP</span><span style="width:50px;text-align:center;font-size:9.5px;color:#888;font-weight:700">Var.</span></div>';
  sems.forEach((v,i)=>{
    const prev = i>0?sems[i-1]:null;
    let varH='<span style="width:50px;text-align:center">—</span>';
    if(prev!==null){const df=v-prev;const c=df>0?'sv-up':df<0?'sv-dn':'sv-eq';const ic=df>0?'▲':df<0?'▼':'=';varH=`<span class="sem-var ${c}" style="width:50px;text-align:center">${ic} ${Math.abs(df)}</span>`;}
    const nota=SEMANAS[i].nota?`<span class="sem-nota"> · ${SEMANAS[i].nota}</span>`:'';
    const mvpV=mvps[i]||0;
    const mvpPrev=i>0?(mvps[i-1]||0):null;
    const mvpCls=mvpPrev===null?'':mvpV>mvpPrev?'sv-up':mvpV<mvpPrev?'sv-dn':'sv-eq';
    h+=`<div class="sem-row"><span class="sem-name">${SEMANAS[i].nome}${nota}</span><span class="sem-val">${N(v)}</span><span class="sem-var ${mvpCls}" style="width:70px;text-align:center;background:${mvpCls==='sv-up'?'#e8f8ee':mvpCls==='sv-dn'?'#fdecea':'#f0f0f0'};color:${mvpCls==='sv-up'?'#1a7a3a':mvpCls==='sv-dn'?'#b00020':'#555'}">${mvpV}</span>${varH}</div>`;
  });
  h+=`<div class="sem-row" style="background:#e8eaff"><span class="sem-name" style="font-weight:700;color:#1a1a2e">Total acumulado</span><span class="sem-val" style="color:#4361ee">${N(vt)}</span><span style="width:70px;text-align:center;font-size:10px;color:#7b2d8b;font-weight:700">${(vt/sems.filter(x=>x>0).length||1).toFixed(1)}</span><span class="sem-var" style="background:#c7d2fb;color:#4361ee;width:50px;text-align:center">${pct}%</span></div>`;
  h+='</div>';
  return h;
}

function syncFiltersToSup() {

  if (activeSups.has('todos')) {

// ─── FILTROS DO RANKING ───────────────────────────────────────────────────
const PROMS = [...new Set(rawData.map(r=>r.p))].sort();
const filterState = {
  equipe:   new Set(['todos']),
  tipo:     new Set(['todos']),
  status:   new Set(['todos']),
  promotor: new Set(['todos']),
};
const filterDefs = {
  equipe:{label:'Equipe',opts:['todos',...SUP_KEYS],
    lbl:{todos:'Todos','HUMBERTO BANQUERI':'Alfa','LUIZ ROBERTO':'Gladiadores','REBECA MOURA':'Fênix','BENVE':'Benve','JOSY BOMFIM':'Administrativo'},search:false},
  tipo:  {label:'Tipo',  opts:['todos','PF','Adesão','PME'],lbl:{todos:'Todos',PF:'PF',Adesão:'Adesão',PME:'PME'},search:false},
  status:{label:'Status',opts:['todos','dentro','abaixo','zerado','especial'],
    lbl:{todos:'Todos',dentro:'No Ritmo',abaixo:'Abaixo',zerado:'Zerado',especial:'Férias/Afastamento'},search:false},
  promotor:{label:'Promotor',opts:['todos',...PROMS],lbl:Object.fromEntries([['todos','Todos'],...PROMS.map(p=>[p,p])]),search:true},
};

function getLbl(key){const s=filterState[key],d=filterDefs[key];if(s.has('todos'))return'Todos';const l=[...s].map(o=>d.lbl[o]||o);return l.length===1?l[0]:l.length+' sel.';}

function buildDropdowns(){
  const w=document.getElementById('filters-wrap');w.innerHTML='';
  Object.keys(filterDefs).forEach(key=>{
    const d=filterDefs[key];const box=document.createElement('div');box.className='filter-box';
    const si=d.search?`<input class="search-inp" placeholder="Buscar..." oninput="fsearch('${key}',this.value)">`:'' ;
    box.innerHTML=`<label>${d.label}</label><button class="dropdown-btn" id="btn-${key}" onclick="tmenu('${key}')">${getLbl(key)} ▾</button>
      <div class="dropdown-menu" id="menu-${key}">${si}<div id="items-${key}">
        ${d.opts.map(o=>`<label class="d-item" onclick="topt('${key}','${o.replace(/'/g,"\\'").replace(/\s/g,'_')}','${o}',event)">
          <input type="checkbox" id="chk-${key}-${o.replace(/\s/g,'_')}" ${o==='todos'?'checked':''}> ${d.lbl[o]||o}</label>`).join('')}
      </div></div>`;
    w.appendChild(box);
  });
  document.addEventListener('click',e=>{if(!e.target.closest('.filter-box'))document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open'));});
}
function fsearch(key,val){const q=val.toLowerCase();document.querySelectorAll(`#items-${key} .d-item`).forEach(i=>{i.style.display=i.textContent.toLowerCase().includes(q)?'':'none';});}
function tmenu(key){document.querySelectorAll('.dropdown-menu').forEach(m=>{if(m.id!==`menu-${key}`)m.classList.remove('open');});document.getElementById(`menu-${key}`).classList.toggle('open');}
function topt(key,safeO,o,e){
  e.stopPropagation();const st=filterState[key];
  if(o==='todos'){st.clear();st.add('todos');document.querySelectorAll(`#items-${key} input`).forEach(c=>c.checked=c.id===`chk-${key}-todos`);}
  else{st.delete('todos');document.getElementById(`chk-${key}-todos`).checked=false;
    if(st.has(o)){st.delete(o);const el=document.getElementById(`chk-${key}-${safeO}`);if(el)el.checked=false;}
    else{st.add(o);const el=document.getElementById(`chk-${key}-${safeO}`);if(el)el.checked=true;}
    if(st.size===0){st.add('todos');document.getElementById(`chk-${key}-todos`).checked=true;}
  }
  // Se mudar equipe no dropdown, sincroniza com chips
  if(key==='equipe'){
    activeSups = new Set(st.has('todos')?['todos']:[...st]);
    updateChipStyles();renderKPIs();renderSupGrid();buildCharts();
  }
  document.getElementById(`btn-${key}`).textContent=getLbl(key)+' ▾';
  render();
}
function updateDropdownUI(key){
  const st=filterState[key],d=filterDefs[key];
  d.opts.forEach(o=>{const el=document.getElementById(`chk-${key}-${o.replace(/\s/g,'_')}`);if(el)el.checked=st.has(o)||(st.has('todos')&&o==='todos');});

}

// ─── SORT & TABELA ────────────────────────────────────────────────────────
let sortCol='v', sortDir=-1;
const COLS=[
  {lbl:'#',key:null},{lbl:'Promotor',key:'p'},{lbl:'Equipe',key:'eqlbl'},
  {lbl:'PF',key:'pf'},{lbl:'Adesão',key:'a'},{lbl:'PME',key:'pme'},
  {lbl:'Vidas',key:'v'},{lbl:'Meta',key:'meta'},{lbl:'% Meta',key:'pct'},
  {lbl:'GAP',key:'gap'},{lbl:'Status',key:'stOrd'},{lbl:'Projeção',key:'projPct'},
  {lbl:'Zero Vendas',key:'dz'},
  {lbl:'% Conversão',key:'cv'},
];
function renderHeader(){
  document.getElementById('thead-row').innerHTML='<tr>'+COLS.map(c=>{
    if(!c.key)return`<th>${c.lbl}</th>`;
    const a=sortCol===c.key?(sortDir===-1?' ↓':' ↑'):'';
    return`<th onclick="sortBy('${c.key}',this)">${c.lbl}${a}</th>`;
  }).join('')+'</tr>';
}
function sortBy(col,el){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
  document.querySelectorAll('thead th').forEach(th=>th.textContent=th.textContent.replace(/ [↑↓]$/,''));
  if(el)el.textContent=el.textContent+(sortDir===-1?' ↓':' ↑');
  render();
}
function render(){
  renderHeader();
  // Determinar conjunto de supervisores do filtro de equipe
  const supSet = filterState.equipe.has('todos')?(activeSups.has('todos')?null:activeSups):filterState.equipe;
  let rows=rawData.map(r=>({...r,eqlbl:scl(r.s),stOrd:stOrder(r.pct,r.p)}));
  if(supSet) rows=rows.filter(r=>supSet.has(r.s));
  if(!filterState.tipo.has('todos')){const ts=[...filterState.tipo];rows=rows.filter(r=>ts.some(t=>(t==='PF'&&r.pf>0)||(t==='Adesão'&&r.a>0)||(t==='PME'&&r.pme>0)));}
  if(!filterState.status.has('todos'))rows=rows.filter(r=>[...filterState.status].includes(stKey(r.pct,r.p)));
  if(!filterState.promotor.has('todos'))rows=rows.filter(r=>[...filterState.promotor].includes(r.p));
  rows.sort((a,b)=>{const va=typeof a[sortCol]==='string'?a[sortCol]:(a[sortCol]??0);const vb=typeof b[sortCol]==='string'?b[sortCol]:(b[sortCol]??0);return typeof va==='string'?sortDir*va.localeCompare(vb):sortDir*(va-vb);});
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="13" style="text-align:center;color:#aaa;padding:20px">Nenhum resultado</td></tr>';return;}
  tbody.innerHTML=rows.map((r,i)=>{
    const sk=stKey(r.pct,r.p);const bc=sk==='especial'?'especial':sk;
    return`<tr>
      <td style="color:#aaa;font-weight:600">${i+1}</td>
      <td style="font-weight:600">${r.p}</td>
      <td class="${scc(r.s)}" style="font-weight:700;font-size:11px">${scl(r.s)}</td>
      <td>${r.pf>0?`<span style="font-weight:700;color:#4361ee">${r.pf}</span>`:'<span style="color:#ddd">—</span>'}</td>
      <td>${r.a>0?`<span style="font-weight:700;color:#1a7a3a">${r.a}</span>`:'<span style="color:#ddd">—</span>'}</td>
      <td>${r.pme>0?`<span style="font-weight:700;color:#b06000">${r.pme}</span>`:'<span style="color:#ddd">—</span>'}</td>
      <td style="font-weight:800;font-size:14px">${r.v}</td>
      <td style="color:#aaa">${r.meta}</td>
      <td style="font-weight:700">${r.pct.toFixed(1)}%</td>
      <td style="color:#c0392b;font-weight:600">${r.gap}</td>
      <td><span class="badge ${bc}">${stLabel(r.pct,r.p)}</span></td>
      <td>${projBadge(r.projPct,r.proj)}</td>
      <td>${dzBadge(r.dz)}</td>
      <td>${cvBadge(r.cv)}</td>
    </tr>`;
  }).join('');
}

// ─── GRÁFICOS ─────────────────────────────────────────────────────────────
function buildCharts() {
  const filtered = activeSups.has('todos')?rawData:rawData.filter(r=>activeSups.has(r.s));
  const supLabel = activeSups.has('todos')?null:([...activeSups].map(k=>sc(k)?.label||k).join(', '));
  const noEsp    = filtered.filter(r=>!STATUS_ESP[r.p]);

  // Global top10 para ranking
  const globalSorted = [...rawData].sort((a,b)=>b.v-a.v);
  const globalTop10  = globalSorted.slice(0,10);

  // Top10 no contexto filtrado
  const ctxSorted = [...filtered].sort((a,b)=>b.v-a.v);
  const top10ctx  = ctxSorted.slice(0,10);

  // Ofensores: excluir status especial
  const ativos    = noEsp.filter(r=>r.v>0).sort((a,b)=>a.v-b.v);
  const bottom10  = ativos.slice(0,10);

  // Zero vendas
  const zeroList  = noEsp.filter(r=>r.dz>0).sort((a,b)=>b.dz-a.dz);

  const maxTop = top10ctx[0]?.v||1;
  const maxBot = bottom10.reduce((a,r)=>Math.max(a,r.v),1);

  function barRows(data,maxV,showGlobalRank=false){
    const globalRankMap = new Map(globalSorted.map((r,i)=>[r.p,i+1]));
    return data.map((r,i)=>{
      const w=maxV>0?Math.round(r.v/maxV*100):0;
      const color=sco(r.s);const eq=scl(r.s);
      const rank=showGlobalRank?`<span class="c-rank" title="Rank geral">#${globalRankMap.get(r.p)||'?'}</span>`:'';
      return`<div class="c-bar-row">${rank}
        <div class="c-name-block"><div class="c-pname" title="${r.p}">${r.p}</div><div class="c-ename" style="color:${color}">${eq}</div></div>
        <div class="c-track"><div class="c-inner" style="width:${w}%;background:${color}">${r.v}</div></div>
        <div class="c-val">${r.v}</div>
      </div>`;
    }).join('');
  }

  // TOP 10
  let top10Html, top10Subtitle='';
  if(activeSups.has('todos')){
    top10Html=barRows(top10ctx,maxTop,false);
  } else {
    // Quantos da equipe estão no top10 global
    const eqInGlobal=globalTop10.filter(r=>filtered.some(f=>f.p===r.p));
    if(eqInGlobal.length===0){
      top10Html=`<div class="empty-msg">Nenhum promotor ${supLabel||''} entre os TOP 10 gerais</div>`;
    } else {
      top10Subtitle=`(${eqInGlobal.length} de ${supLabel||''} entre os TOP 10 gerais)`;
      // Mostrar top10 da equipe com rank global
      top10Html=barRows(top10ctx,maxTop,true);
    }
  }

  // OFENSORES
  let botHtml, botSubtitle='';
  if(activeSups.has('todos')){
    botHtml=barRows(bottom10,maxBot,false);
  } else {
    if(bottom10.length===0){
      botHtml=`<div class="empty-msg">Nenhum promotor ${supLabel||''} com vendas</div>`;
    } else {
      botHtml=barRows(bottom10,maxBot,false);
    }
  }

  // ZERO VENDAS
  const zeroItems=zeroList.map(r=>{
    const color=sco(r.s);const eq=scl(r.s);
    const txt=r.dz===1?'1 dia':`${r.dz} dias`;const pct=Math.round(r.dz/DIAS_TRAB*100);
    return`<li class="z-item"><div><div class="z-pname">${r.p}</div><div class="z-ename" style="color:${color}">${eq}</div></div>
      <div class="z-right"><div class="z-dias">${txt}</div><div class="z-pct">${pct}% dos dias</div></div></li>`;
  }).join('');

  document.getElementById('charts-grid').innerHTML=`
    <div class="chart-card">
      <div class="chart-title">🏆 TOP 10 — Mais Vidas <span class="chart-sub">${top10Subtitle}</span></div>
      ${top10ctx.length?top10Html:`<div class="empty-msg">Nenhum promotor encontrado</div>`}
    </div>
    <div class="chart-card">
      <div class="chart-title">⚠️ TOP 10 Ofensores — Menos Vidas</div>
      ${bottom10.length?botHtml:'<div class="empty-msg">Nenhum promotor com vendas</div>'}
    </div>
    <div class="chart-card">
      <div class="chart-title">📅 Zero Vendas <span class="chart-sub">(${zeroList.length} promotores)</span></div>
      ${zeroList.length?`<ul class="zero-list">${zeroItems}</ul>`:'<div class="empty-msg">🎉 Todos venderam todos os dias!</div>'}
    </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────
renderKPIs();
render();
buildCharts();
</script>

// ─── HELPERS ─────────────────────────────────────────────────────────────
const SUPMAP = {
  'HUMBERTO BANQUERI':'Alfa',
  'LUIZ ROBERTO':'Gladiadores',
  'REBECA MOURA':'Fênix',
  'BENVE':'Benve',
  'JOSY BOMFIM':'Administrativo'
};
const BASES = {pf:RAW_PF, ade:RAW_ADE, pme:RAW_PME};

let baseAtiva = 'pf';
let bSortCol = null;
let bSortDir = -1;
let bEquipeSel = new Set(['todos']);
let bPromSel   = new Set(['todos']);

function uniq(arr){return [...new Set(arr)].filter(Boolean).sort();}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));}

function getEquipeLabel(sup){return SUPMAP[sup]||sup||'—';}

function rowsAtivas(){
  let rows = BASES[baseAtiva]||[];
  if(!bEquipeSel.has('todos')){
    rows = rows.filter(r => bEquipeSel.has(r.supervisor));
  }
  if(!bPromSel.has('todos')){
    rows = rows.filter(r => bPromSel.has(r.promotor));
  }
  return rows;
}

  defs.forEach(d=>{
    const box=document.createElement('div');box.className='filter-box';
    const si=d.search?`<input class="search-inp" placeholder="Buscar..." oninput="bsearch('${d.key}',this.value)">`:'' ;
    box.innerHTML=`<label>${d.label}</label>
      <button class="dropdown-btn" id="bbtn-${d.key}" onclick="btmenu('${d.key}')">Todos ▾</button>
      <div class="dropdown-menu" id="bmenu-${d.key}">
        ${si}
        <div id="bitems-${d.key}">
          ${d.opts.map(o=>{
            const safe = o.replace(/'/g,"\\'").replace(/\s/g,'_');
            return `<label class="d-item" onclick="btopt('${d.key}','${safe}','${o}',event)">
              <input type="checkbox" id="bchk-${d.key}-${safe}" ${o==='todos'?'checked':''}> ${esc(d.lbl(o))}
            </label>`;
          }).join('')}
        </div>
      </div>`;
    wrap.appendChild(box);
  });

  document.addEventListener('click',e=>{
    if(!e.target.closest('#bfilters-wrap .filter-box')){
      document.querySelectorAll('#bfilters-wrap .dropdown-menu').forEach(m=>m.classList.remove('open'));
    }
  });

  updateBaseBtns();
}

function bsearch(key,val){
  const q=val.toLowerCase();
  document.querySelectorAll(`#bitems-${key} .d-item`).forEach(i=>{
    i.style.display=i.textContent.toLowerCase().includes(q)?'':'none';
  });
}

function btmenu(key){
  document.querySelectorAll('#bfilters-wrap .dropdown-menu').forEach(m=>{
    if(m.id!==`bmenu-${key}`)m.classList.remove('open');
  });
  document.getElementById(`bmenu-${key}`).classList.toggle('open');
}

function btopt(key,safe,o,e){
  e.stopPropagation();
  const st = key==='equipe'?bEquipeSel:bPromSel;

  if(o==='todos'){
    st.clear();st.add('todos');
    document.querySelectorAll(`#bitems-${key} input`).forEach(c=>{
      c.checked = c.id===`bchk-${key}-todos`;
    });
  } else {
    st.delete('todos');
    const todos = document.getElementById(`bchk-${key}-todos`);
    if(todos) todos.checked=false;

    if(st.has(o)){
      st.delete(o);
      const el=document.getElementById(`bchk-${key}-${safe}`);
      if(el) el.checked=false;
    } else {
      st.add(o);
      const el=document.getElementById(`bchk-${key}-${safe}`);
      if(el) el.checked=true;
    }

    if(st.size===0){
      st.add('todos');
      const el=document.getElementById(`bchk-${key}-todos`);
      if(el) el.checked=true;
    }
  }

  updateBaseBtns();
  renderBaseTable();
}

function updateBaseBtns(){
  const eqTxt = bEquipeSel.has('todos') ? 'Todos' : (bEquipeSel.size===1 ? getEquipeLabel([...bEquipeSel][0]) : `${bEquipeSel.size} sel.`);
  const prTxt = bPromSel.has('todos') ? 'Todos' : (bPromSel.size===1 ? [...bPromSel][0] : `${bPromSel.size} sel.`);
  const eqBtn=document.getElementById('bbtn-equipe');
  const prBtn=document.getElementById('bbtn-prom');
  if(eqBtn) eqBtn.textContent = eqTxt+' ▾';
  if(prBtn) prBtn.textContent = prTxt+' ▾';
}

// ─── TABLE RENDER ─────────────────────────────────────────────────────────
function colsForBase(){
  if(baseAtiva==='pf'){
    return [
      {lbl:'#', key:null},
      {lbl:'Supervisor', key:'supervisor'},
      {lbl:'Equipe', key:'eq'},
      {lbl:'Promotor', key:'promotor'},
      {lbl:'Controle', key:'controle'},
      {lbl:'CPF', key:'cpf'},
      {lbl:'Nome', key:'nome'},
      {lbl:'Vidas', key:'vidas'},
      {lbl:'Celular', key:'celular'},
      {lbl:'Data', key:'data'},
      {lbl:'Plano', key:'plano'},
      {lbl:'Status', key:'status'}
    ];
  }
  if(baseAtiva==='ade'){
    return [
      {lbl:'#', key:null},
      {lbl:'Supervisor', key:'supervisor'},
      {lbl:'Equipe', key:'eq'},
      {lbl:'Promotor', key:'promotor'},
      {lbl:'Controle', key:'controle'},
      {lbl:'CPF', key:'cpf'},
      {lbl:'Nome', key:'nome'},
      {lbl:'Vidas', key:'vidas'},
      {lbl:'Celular', key:'celular'},
      {lbl:'Data', key:'data'},
      {lbl:'Plano', key:'plano'},
      {lbl:'Status', key:'status'}
    ];
  }
  if(baseAtiva==='pme'){
    return [
      {lbl:'#', key:null},
      {lbl:'Supervisor', key:'supervisor'},
      {lbl:'Equipe', key:'eq'},
      {lbl:'Promotor', key:'promotor'},
      {lbl:'Controle', key:'controle'},
      {lbl:'CNPJ', key:'cnpj'},
      {lbl:'Empresa', key:'empresa'},
      {lbl:'Vidas', key:'vidas'},
      {lbl:'Data', key:'data'},
      {lbl:'Plano', key:'plano'},
      {lbl:'Status', key:'status'}
    ];
  }
  return [];
}

function renderBaseTable(){
  const rows = rowsAtivas().map(r=>({...r, eq:getEquipeLabel(r.supervisor)}));
  const cols = colsForBase();

  // sort
  if(bSortCol){
    rows.sort((a,b)=>{
      const va = a[bSortCol] ?? '';
      const vb = b[bSortCol] ?? '';
      const na = parseFloat(String(va).replace(',','.'));
      const nb = parseFloat(String(vb).replace(',','.'));
      const isNum = !isNaN(na) && !isNaN(nb);
      if(isNum) return bSortDir*(na-nb);
      return bSortDir*String(va).localeCompare(String(vb));
    });
  }

  // header
  document.getElementById('bthead').innerHTML = `<tr>${
    cols.map(c=>{
      if(!c.key) return `<th>${c.lbl}</th>`;
      const icon = (bSortCol===c.key) ? (bSortDir===-1?'↓':'↑') : '';
      const cls  = (bSortCol===c.key) ? 'sorted' : '';
      return `<th class="${cls}" onclick="bsort('${c.key}')">${c.lbl} <span class="sort-icon">${icon}</span></th>`;
    }).join('')
  }</tr>`;

  // body
  if(!rows.length){
    document.getElementById('btbody').innerHTML = `<tr><td colspan="${cols.length}" style="text-align:center;color:#aaa;padding:20px">Nenhum resultado</td></tr>`;
  } else {
    document.getElementById('btbody').innerHTML = rows.map((r,i)=>{
      return `<tr>${
        cols.map(c=>{
          if(!c.key) return `<td style="color:#888">${i+1}</td>`;
          return `<td>${esc(r[c.key])}</td>`;
        }).join('')
      }</tr>`;
    }).join('');
  }

  document.getElementById('bcount').textContent = `Registros: ${rows.length}`;
}

window.bsort = function(col){
  if(bSortCol===col) bSortDir*=-1;
  else { bSortCol=col; bSortDir=-1; }
  renderBaseTable();
};

// ─── TABS ────────────────────────────────────────────────────────────────
document.querySelectorAll('#btabs-nav .btab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#btabs-nav .btab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    baseAtiva = btn.dataset.base;
    bSortCol=null;
    bEquipeSel=new Set(['todos']);
    bPromSel=new Set(['todos']);
    buildBaseFilters();
    renderBaseTable();
  });
});

// ─── INIT ────────────────────────────────────────────────────────────────
buildBaseFilters();
renderBaseTable();

})();
</script>
