<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Central de Performance</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#F0F4F8;color:#1A2332;font-size:14px}
  :root{
    --green:#10B981;--green-lt:#D1FAE5;
    --amber:#F59E0B;--amber-lt:#FEF3C7;
    --red:#EF4444;  --red-lt:#FEE2E2;
    --blue:#2563EB; --blue-lt:#DBEAFE;
    --surface:#fff; --border:#E2E8F0;
    --text:#1A2332; --sub:#4A5568; --muted:#94A3B8;
  }
  /* HEADER */
  .header{background:linear-gradient(135deg,#1A2332 0%,#2D3F5C 100%);padding:20px 28px 0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .header-top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px}
  .header-label{font-size:9px;letter-spacing:4px;color:#7EB3FF;text-transform:uppercase;font-weight:700;margin-bottom:4px}
  .header-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}
  .header-sub{font-size:11px;color:#8FA3C0;margin-top:3px}
  .kpi-strip{display:flex;gap:8px;flex-wrap:wrap}
  .kpi-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;text-align:center;min-width:110px}
  .kpi-val{font-size:20px;font-weight:900;letter-spacing:-.5px}
  .kpi-label{font-size:9px;color:rgba(255,255,255,.6);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .kpi-sub{font-size:12px;font-weight:700;margin-top:2px}
  /* TABS */
  .tabs{display:flex;gap:2px}
  .tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.5);padding:9px 20px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;font-family:inherit}
  .tab-btn.active{color:#7EB3FF;border-bottom-color:#7EB3FF;font-weight:700}
  /* PANELS */
  .main{padding:20px 28px;max-width:1380px}
  .panel{display:none}.panel.active{display:block}
  /* FILTER BAR */
  .filter-bar{background:var(--surface);border-radius:12px;padding:12px 16px;margin-bottom:16px;border:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .filter-group{display:flex;flex-direction:column;gap:5px}
  .filter-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase}
  .filter-bar select{padding:6px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--text);background:#F8FAFC;outline:none;cursor:pointer;font-family:inherit;min-width:160px}
  .btn-group{display:flex;gap:4px}
  .btn-toggle{background:transparent;border:1px solid var(--border);color:var(--sub);border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:400;font-family:inherit;transition:all .15s;white-space:nowrap}
  .btn-toggle.active{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
  /* EQUIPE CHIP BUTTONS */
  .equipe-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .equipe-btn{border:2px solid transparent;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;opacity:.7}
  .equipe-btn.active{opacity:1;transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.15)}
  /* CARD */
  .card{background:var(--surface);border-radius:12px;padding:18px 20px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04);margin-bottom:16px}
  .card-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .kpi-inner{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .kpi-inner .val{font-size:22px;font-weight:900;letter-spacing:-.5px}
  .kpi-inner .lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
  .kpi-inner .sub{font-size:11px;margin-top:2px;font-weight:600}
  /* TOP10 */
  .top10-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .top10-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .top10-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
  .top10-strip{width:4px;height:18px;border-radius:2px;flex-shrink:0}
  .top10-title{font-size:13px;font-weight:700}
  .top10-sub{font-size:10px;color:var(--sub)}
  .top10-col-head{display:grid;grid-template-columns:28px 1fr 60px 60px;gap:6px;padding:6px 14px;font-size:9px;color:var(--muted);letter-spacing:.7px;text-transform:uppercase;background:#FAFBFD;border-bottom:1px solid var(--border)}
  .top10-row{display:grid;grid-template-columns:28px 1fr 60px 60px;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid #F0F4F8;transition:background .12s}
