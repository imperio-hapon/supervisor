<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Leads</title>

<style>
body { font-family: Arial; background:#f5f7fb; padding:20px; }
h1 { margin-bottom:10px; }

.controls { margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; }
button { padding:6px 12px; cursor:pointer; border:1px solid #ccc; background:#fff; }
input { padding:6px; }

.card { background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }

.reinc-item { padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; }
.reinc-item.danger { background:#ffecec; }
</style>
</head>

<body>

<h1>📊 Dashboard de Leads</h1>

<div class="controls">
  <strong>Mês:</strong>
  <button onclick="setMes(0)">Jan</button>
  <button onclick="setMes(1)">Fev</button>
  <button onclick="setMes(2)">Mar</button>
  <button onclick="setMes(3)">Abr</button>
  <button onclick="setMes(4)">Mai</button>
  <button onclick="setMes(5)">Jun</button>

  <strong>Período:</strong>
  <input type="date" id="inicio">
  <input type="date" id="fim">
  <button onclick="setPeriodo()">Aplicar</button>
</div>

<div class="card">
  <h3>⚠ Reincidentes</h3>
  <div id="reincList"></div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnlwiAP5sVy5NpzqrHObGJcqL6BsyzNoWNM8CC-iBD74TkHRDYVzFHOm14WEBv8mwXmn0N2lgX87pH/gviz/tq?tqx=out:json';
const LIMIT = 150;

let DATA_ORIGINAL = [];
let RAW = [];

let filtroMes = null;
let dataInicio = null;
let dataFim = null;

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    DATA_ORIGINAL = rows.map(r => {
      const c = r.c;
      return {
        nome: c[0]?.v || '',
        equipe: c[1]?.v || '',
        total: parseInt(c[2]?.v) || 0,
        aguardando: parseInt(c[3]?.v) || 0,
        data: c[4]?.v ? new Date(c[4].v) : null
      };
    });

    RAW = [...DATA_ORIGINAL];

    processarReincidentes();
    renderReincidentes();

  } catch (e) {
    console.error(e);
    alert('Erro ao carregar dados da planilha');
  }
}

function aplicarFiltro() {
  RAW = DATA_ORIGINAL.filter(d => {

    if (filtroMes !== null && d.data) {
      if (d.data.getMonth() !== filtroMes) return false;
    }

    if (dataInicio && d.data < dataInicio) return false;
    if (dataFim && d.data > dataFim) return false;

    return true;
  });

  processarReincidentes();
  renderReincidentes();
}

function setMes(m) {
  filtroMes = m;
  aplicarFiltro();
}

function setPeriodo() {
  const ini = document.getElementById('inicio').value;
  const fim = document.getElementById('fim').value;

  dataInicio = ini ? new Date(ini) : null;
  dataFim = fim ? new Date(fim) : null;

  aplicarFiltro();
}

function processarReincidentes() {
  const mapa = {};

  RAW.forEach(d => {
    if (d.total > LIMIT) {

      if (!mapa[d.nome]) {
        mapa[d.nome] = {
          dias: new Set(),
          semana: 0
        };
      }

      let dia = d.data ? d.data.toDateString() : 'sem';
      mapa[d.nome].dias.add(dia);

      if (d.data) {
        let hoje = new Date();
        let diff = (hoje - d.data) / (1000*60*60*24);
        if (diff <= 7) mapa[d.nome].semana++;
      }
    }
  });

  RAW.forEach(d => {
    let r = mapa[d.nome];
    d.reincidente = r && r.dias.size > 1;
    d.qtdDias = r ? r.dias.size : 0;
    d.semana = r ? r.semana : 0;
  });
}

function renderReincidentes() {
  const list = RAW.filter(d => d.reincidente)
    .sort((a,b) => b.qtdDias - a.qtdDias);

  document.getElementById('reincList').innerHTML =
    list.map(d => `
      <div class="reinc-item ${d.total > LIMIT ? 'danger':''}">
        <div>
          <strong>${d.nome}</strong><br>
          ${d.qtdDias} dias como ofensor · ${d.semana}x na semana
        </div>
        <div><strong>${d.total}</strong></div>
      </div>
    `).join('');
}

loadData();
</script>

</body>
</html>
